<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Reasoning Tester</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#1a73e8">

</head>

<body>

<div class="app">

<header>
<h1>AI Reasoning Tester</h1>
</header>

<section class="card">

<label>OpenRouter API Key</label>
<input id="apikey" type="password" placeholder="Enter API key">

<label>Question</label>
<textarea id="question" rows="3" placeholder="Type your question"></textarea>

<button id="askBtn">Ask AI</button>

</section>

<section class="card">

<h3>Answer</h3>
<div id="answer" class="output"></div>

<h3>Reasoning</h3>
<div id="reasoning" class="output"></div>

</section>

</div>

<script src="app.js"></script>

</body>
</html>
