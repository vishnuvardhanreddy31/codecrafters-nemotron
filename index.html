<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Reasoning Chat</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#10a37f">

</head>

<body>

<div class="app">

<header class="topbar">

<div class="title">AI Reasoning Chat</div>

<div class="top-actions">

<select id="model">
<option value="nvidia/nemotron-nano-12b-v2-vl:free">
Nemotron Nano
</option>

<option value="mistralai/mistral-7b-instruct">
Mistral 7B
</option>

<option value="meta-llama/llama-3-8b-instruct">
Llama-3 8B
</option>

</select>

<button id="clear">Clear</button>

<button id="settingsBtn">⚙</button>

</div>

</header>

<div id="chat" class="chat"></div>

<div class="input-area">

<textarea id="prompt" rows="1" placeholder="Ask something..."></textarea>

<button id="send">Send</button>

</div>

</div>


<div id="settings" class="settings hidden">

<div class="settings-box">

<h3>OpenRouter API Key</h3>

<input id="apikey" type="password">

<button id="saveKey">Save</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
